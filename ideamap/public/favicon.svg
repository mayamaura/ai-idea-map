<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- 電球ドーム：頂部→左右 -->
  <line x1="7" y1="15" x2="16" y2="5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="5" x2="25" y2="15" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 左右から中心アイデアノードへ収束 -->
  <line x1="7" y1="15" x2="16" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="15" x2="16" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- ネック -->
  <line x1="16" y1="19" x2="16" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- ベース（口金） -->
  <line x1="11" y1="24" x2="21" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- ノード -->
  <circle cx="16" cy="5" r="2.5" fill="white"/>
  <circle cx="7" cy="15" r="2" fill="white"/>
  <circle cx="25" cy="15" r="2" fill="white"/>
  <circle cx="16" cy="19" r="3" fill="white"/>
</svg>
